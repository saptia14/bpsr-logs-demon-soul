<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BPSR Logs</title>
<link rel="stylesheet" href="bpsr/tokens.css" />
<link rel="stylesheet" href="bpsr/screens.css" />
<style>
	/* fit-to-viewport scaling for the fixed-size overlay window */
	#root { width: 100%; height: 100%; }
	.win { transform: scale(var(--fit, 1)); transform-origin: center center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="bpsr/data.js"></script>
<script type="text/babel" src="bpsr/components.jsx"></script>
<script type="text/babel" src="bpsr/screens-meter.jsx"></script>
<script type="text/babel" src="bpsr/screens-misc.jsx"></script>
<script type="text/babel" src="bpsr/screens-settings.jsx"></script>
<script type="text/babel" src="bpsr/app.jsx"></script>

<script>
	// keep the fixed-size window fitted inside whatever viewport it's previewed in
	function fitWin() {
		const win = document.querySelector('.win');
		if (!win) return;
		const r = win.getBoundingClientRect();
		const w = r.width / (parseFloat(getComputedStyle(win).getPropertyValue('--fit')) || 1);
		const h = r.height / (parseFloat(getComputedStyle(win).getPropertyValue('--fit')) || 1);
		const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 60) / h);
		win.style.setProperty('--fit', scale.toFixed(4));
	}
	const obs = new MutationObserver(() => fitWin());
	window.addEventListener('resize', fitWin);
	const boot = setInterval(() => {
		const win = document.querySelector('.win');
		if (win) {
			clearInterval(boot);
			obs.observe(win, { attributes: true, attributeFilter: ['class'] });
			fitWin();
			setInterval(fitWin, 500);
		}
	}, 60);
</script>
</body>
</html>
