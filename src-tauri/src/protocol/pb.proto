syntax = "proto3";

package pb;

enum EDamageType {
  Normal = 0;
  Miss = 1;
  Heal = 2;
}

enum EEntityType {
  EntErrType = 0;
  EntMonster = 1;
  EntChar = 10;
}

message Attr {
  int32 id = 1;
  bytes raw_data = 2;
}

message AttrCollection {
  int64 uuid = 1;
  repeated Attr attrs = 2;
}

message AoiSyncDelta {
  int64 uuid = 1;
  AttrCollection attrs = 2;
  SkillEffect skill_effects = 7;
}

message AoiSyncToMeDelta {
  AoiSyncDelta base_delta = 1;
  int64 uuid = 5;
}

message CharBaseInfo {
  int64 char_id = 1;
  string account_id = 2;
  string name = 5;
  int32 fight_point = 35;
}

message CharSerialize {
  int64 char_id = 1;
  CharBaseInfo char_base = 2;
  SceneData scene_data = 3;
  ItemPackage item_package = 7;
  Mod mod = 57;
  ProfessionList profession_list = 61;
}

message DisappearEntity { int64 uuid = 1; }

message Entity {
  int64 uuid = 1;
  EEntityType ent_type = 2;
  AttrCollection attrs = 3;
}

message Item {
  int32 config_id = 2;
  int32 quality = 9;
  ModNewAttr mod_new_attr = 13;
}

message ItemPackage { map<int32, Package> packages = 1; }

message Mod { map<int64, ModInfo> mod_infos = 2; }

message ModInfo { repeated int32 init_link_nums = 4; }

message ModNewAttr { repeated int32 mod_parts = 1; }

message NotifySocialData { NotifySocialDataRequest v_request = 1; }

message NotifySocialDataRequest { SocialData data = 1; }

// --- Chat (ChitChatNtf service, method NotifyNewestChitChatMsgs) ---
// Enums (channel_type / msg_type) are decoded as int32 to avoid enum codegen.
message NotifyNewestChitChatMsgs { NotifyNewestChitChatMsgsRequest v_request = 1; }

message NotifyNewestChitChatMsgsRequest {
  int32 channel_type = 1; // ChitChatChannelType: World=1 Local/Scene=2 Team=3 Union=4 Private=5 Group=6 System=99
  ChitChatMsg chat_msg = 2;
}

message ChitChatMsg {
  int64 msg_id = 1;              // game id (per channel+session); used for the idempotency key
  BasicShowInfo send_char_info = 2;
  int64 timestamp = 3;          // unix seconds
  ChatMsgInfo msg_info = 4;
}

message ChatMsgInfo {
  int32 msg_type = 1;           // ChitChatMsgType: text=0 (others: notice/multilang/emoji/picture/voice/hypertext)
  int64 target_id = 2;
  string msg_text = 3;
}

message BasicShowInfo {
  int64 char_id = 1;
  string name = 2;
  int32 level = 5;
}

message Package { map<int64, Item> items = 4; }

message ProfessionList { int32 cur_profession_id = 1; }

message SceneData {
  uint32 level_map_id = 6;
  uint32 line_id = 15;
}

message SkillEffect { repeated SyncDamageInfo damages = 2; }

message SocialData { SceneData scene_data = 10; }

message SyncContainerData { CharSerialize v_data = 1; }

message SyncDamageInfo {
  bool is_miss = 2;
  EDamageType type = 4;
  int32 type_flag = 5;
  int64 value = 6;
  int64 lucky_value = 8;
  int64 hp_lessen_value = 9;
  int64 attacker_uuid = 11;
  int32 owner_id = 12;
  bool is_dead = 17;
  int64 top_summoner_id = 21;
}

message SyncNearDeltaInfo { repeated AoiSyncDelta delta_infos = 1; }

message SyncNearEntities {
  repeated Entity appear = 1;
  repeated DisappearEntity disappear = 2;
}

message SyncToMeDeltaInfo { AoiSyncToMeDelta delta_info = 1; }

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}
